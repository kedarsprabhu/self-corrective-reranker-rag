<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self RAG Chat</title>
  <meta name="description" content="Chat with your documents using AI-powered retrieval augmented generation" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a1a;
      --bg-secondary: #12122a;
      --bg-card: rgba(255, 255, 255, 0.04);
      --bg-card-hover: rgba(255, 255, 255, 0.07);
      --bg-input: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.08);
      --border-active: rgba(102, 126, 234, 0.5);
      --text-primary: #e8e8f0;
      --text-secondary: #8888a8;
      --text-muted: #5a5a7a;
      --accent-start: #667eea;
      --accent-end: #764ba2;
      --accent: #667eea;
      --success: #4ade80;
      --error: #f87171;
      --warning: #fbbf24;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Layout ─────────────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header h1 span {
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.2);
      font-size: 12px;
      color: var(--success);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── Sidebar ────────────────────────────────────── */
    .sidebar {
      width: 280px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.15);
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-secondary);
    }

    .doc-count {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--bg-card);
      color: var(--text-muted);
    }

    .upload-area {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .upload-btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1.5px dashed var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .upload-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(102, 126, 234, 0.05);
    }

    .upload-btn.uploading {
      border-color: var(--warning);
      color: var(--warning);
      pointer-events: none;
    }

    .doc-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .doc-list::-webkit-scrollbar {
      width: 4px;
    }

    .doc-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .doc-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .doc-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-bottom: 2px;
    }

    .doc-item:hover {
      background: var(--bg-card-hover);
    }

    .doc-item.selected {
      background: rgba(102, 126, 234, 0.12);
      border: 1px solid rgba(102, 126, 234, 0.25);
    }

    .doc-item:not(.selected) {
      border: 1px solid transparent;
    }

    .doc-checkbox {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s ease;
      font-size: 10px;
    }

    .doc-item.selected .doc-checkbox {
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      border-color: transparent;
    }

    .doc-icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    .doc-info {
      flex: 1;
      min-width: 0;
    }

    .doc-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .doc-date {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .doc-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
      color: var(--text-muted);
      gap: 8px;
    }

    .doc-empty-icon {
      font-size: 32px;
      opacity: 0.5;
    }

    .doc-empty-text {
      font-size: 13px;
    }

    /* ─── Chat Area ──────────────────────────────────── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-muted);
    }

    .chat-empty-icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .chat-empty h2 {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .chat-empty p {
      font-size: 13px;
      max-width: 320px;
      text-align: center;
      line-height: 1.6;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.bot .message-avatar {
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
    }

    .message.user .message-avatar {
      background: var(--bg-card);
      border: 1px solid var(--border);
    }

    .message-content {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
    }

    .message.bot .message-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message.user .message-content {
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message-meta {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .meta-chip {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      background: rgba(102, 126, 234, 0.1);
      border: 1px solid rgba(102, 126, 234, 0.15);
      color: var(--accent);
    }

    .meta-chip.confidence {
      background: rgba(74, 222, 128, 0.1);
      border-color: rgba(74, 222, 128, 0.15);
      color: var(--success);
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typing 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {

      0%,
      60%,
      100% {
        opacity: 0.3;
        transform: translateY(0);
      }

      30% {
        opacity: 1;
        transform: translateY(-4px);
      }
    }

    /* ─── Chat Input ─────────────────────────────────── */
    .chat-input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .selected-docs-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .selected-doc-chip {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 6px;
      background: rgba(102, 126, 234, 0.1);
      border: 1px solid rgba(102, 126, 234, 0.2);
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .selected-doc-chip .remove {
      cursor: pointer;
      opacity: 0.6;
      font-size: 13px;
    }

    .selected-doc-chip .remove:hover {
      opacity: 1;
    }

    .chat-input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 120px;
      transition: border-color 0.2s ease;
    }

    .chat-input:focus {
      border-color: var(--border-active);
    }

    .chat-input::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ─── Toast ───────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      display: none;
    }

    .toast.show {
      display: block;
    }

    .toast.success {
      background: rgba(74, 222, 128, 0.15);
      border: 1px solid rgba(74, 222, 128, 0.3);
      color: var(--success);
    }

    .toast.error {
      background: rgba(248, 113, 113, 0.15);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--error);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── Modal ───────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .modal-overlay.show {
      display: flex;
      opacity: 1;
    }

    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      animation: modalSlideIn 0.3s ease;
    }

    @keyframes modalSlideIn {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: var(--text-primary);
    }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.6;
    }

    .modal-list {
      list-style-type: disc;
      padding-left: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .meta-chip.interactive {
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .meta-chip.interactive:hover {
      background: rgba(102, 126, 234, 0.2);
      border-color: rgba(102, 126, 234, 0.4);
    }

    /* ─── Hidden file input ──────────────────────────── */
    #file-input {
      display: none;
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">🧠</div>
        <h1>Self <span>RAG</span> Chat</h1>
      </div>
      <div class="status-badge" id="status-badge">
        <div class="status-dot"></div>
        <span>Connected</span>
      </div>
    </header>

    <div class="main">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Documents</span>
          <span class="doc-count" id="doc-count">0</span>
        </div>

        <div class="upload-area">
          <button class="upload-btn" id="upload-btn" onclick="document.getElementById('file-input').click()">
            📄 Upload Document
          </button>
          <input type="file" id="file-input" accept=".pdf,.txt,.doc,.docx" />
        </div>

        <div class="doc-list" id="doc-list">
          <div class="doc-empty" id="doc-empty">
            <div class="doc-empty-icon">📂</div>
            <div class="doc-empty-text">No documents yet.<br />Upload one to get started.</div>
          </div>
        </div>
      </aside>

      <!-- Chat -->
      <div class="chat-area">
        <div class="chat-messages" id="chat-messages">
          <div class="chat-empty" id="chat-empty">
            <div class="chat-empty-icon">💬</div>
            <h2>Ask your documents</h2>
            <p>Select one or more documents from the sidebar, then ask a question below to get AI-powered answers.</p>
          </div>
        </div>

        <div class="chat-input-area">
          <div class="selected-docs-bar" id="selected-docs-bar"></div>
          <div class="chat-input-row">
            <textarea class="chat-input" id="chat-input" placeholder="Ask a question about your documents..."
              rows="1"></textarea>
            <button class="send-btn" id="send-btn" disabled>➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Modal -->
  <div class="modal-overlay" id="details-modal" onclick="closeDetailsModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-title">Details</h3>
        <button class="modal-close" onclick="closeDetailsModal()">×</button>
      </div>
      <div class="modal-body" id="modal-body">
      </div>
    </div>
  </div>

  <script>
    // ─── State ──────────────────────────────────────────
    const API_BASE = window.location.origin;
    const CLIENT_ID = "catesigo123";
    const CLIENT_SECRET = "internal164";

    let authToken = null;
    let documents = [];
    let selectedDocs = new Set();
    let chatSession = crypto.randomUUID();
    let isStreaming = false;

    // ─── DOM refs ───────────────────────────────────────
    const $docList = document.getElementById("doc-list");
    const $docEmpty = document.getElementById("doc-empty");
    const $docCount = document.getElementById("doc-count");
    const $chatMessages = document.getElementById("chat-messages");
    const $chatEmpty = document.getElementById("chat-empty");
    const $chatInput = document.getElementById("chat-input");
    const $sendBtn = document.getElementById("send-btn");
    const $uploadBtn = document.getElementById("upload-btn");
    const $fileInput = document.getElementById("file-input");
    const $selectedDocsBar = document.getElementById("selected-docs-bar");
    const $toast = document.getElementById("toast");

    // ─── Utility ────────────────────────────────────────
    function showToast(msg, type = "success") {
      $toast.textContent = msg;
      $toast.className = `toast show ${type}`;
      setTimeout(() => $toast.classList.remove("show"), 3500);
    }

    // ─── Modal ──────────────────────────────────────────
    function showDetailsModal(title, itemsJson) {
      try {
        const items = JSON.parse(decodeURIComponent(itemsJson));
        document.getElementById("modal-title").textContent = title;
        const $body = document.getElementById("modal-body");
        if (Array.isArray(items) && items.length > 0) {
          $body.innerHTML = `<ul class="modal-list">${items.map(item => `<li>${escapeHtml(String(item))}</li>`).join("")}</ul>`;
        } else {
          $body.innerHTML = "<p>No details available.</p>";
        }
        document.getElementById("details-modal").classList.add("show");
      } catch (e) {
        console.error("Error parsing modal details", e);
      }
    }

    function closeDetailsModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById("details-modal").classList.remove("show");
    }

    function formatDate(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }

    function getFileIcon(name) {
      if (name.endsWith(".pdf")) return "📕";
      if (name.endsWith(".doc") || name.endsWith(".docx")) return "📘";
      if (name.endsWith(".txt")) return "📄";
      return "📄";
    }

    // ─── Auth ───────────────────────────────────────────
    async function authenticate() {
      try {
        const resp = await fetch(`${API_BASE}/token`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ client_id: CLIENT_ID, client_secret: CLIENT_SECRET }),
        });
        if (!resp.ok) throw new Error("Auth failed");
        const data = await resp.json();
        authToken = data.access_token;
        return true;
      } catch (e) {
        showToast("Failed to authenticate", "error");
        return false;
      }
    }

    function authHeaders() {
      return { Authorization: `Bearer ${authToken}` };
    }

    // ─── Documents ──────────────────────────────────────
    async function loadDocuments() {
      try {
        const resp = await fetch(`${API_BASE}/v1/documents`, { headers: authHeaders() });
        if (!resp.ok) throw new Error("Failed to load");
        const data = await resp.json();
        documents = data.documents || [];
        renderDocuments();
      } catch (e) {
        showToast("Failed to load documents", "error");
      }
    }

    function renderDocuments() {
      // Remove all doc-item elements but keep doc-empty
      $docList.querySelectorAll(".doc-item").forEach(el => el.remove());
      $docCount.textContent = documents.length;

      if (documents.length === 0) {
        $docEmpty.style.display = "flex";
        return;
      }
      $docEmpty.style.display = "none";

      documents.forEach(doc => {
        const el = document.createElement("div");
        el.className = `doc-item${selectedDocs.has(doc.file_name) ? " selected" : ""}`;
        el.innerHTML = `
          <div class="doc-checkbox">${selectedDocs.has(doc.file_name) ? "✓" : ""}</div>
          <div class="doc-icon">${getFileIcon(doc.file_name)}</div>
          <div class="doc-info">
            <div class="doc-name" title="${doc.object_key}">${doc.object_key}</div>
            <div class="doc-date">${formatDate(doc.downloaded_on)}</div>
          </div>
        `;
        el.addEventListener("click", () => toggleDoc(doc.file_name));
        $docList.appendChild(el);
      });

      renderSelectedDocsBar();
      updateSendState();
    }

    function toggleDoc(fileName) {
      if (selectedDocs.has(fileName)) {
        selectedDocs.delete(fileName);
      } else {
        selectedDocs.add(fileName);
      }
      renderDocuments();
    }

    function renderSelectedDocsBar() {
      $selectedDocsBar.innerHTML = "";
      selectedDocs.forEach(name => {
        const doc = documents.find(d => d.file_name === name);
        const displayName = doc ? doc.object_key : name;
        const chip = document.createElement("div");
        chip.className = "selected-doc-chip";
        chip.innerHTML = `📄 ${displayName} <span class="remove" onclick="event.stopPropagation(); toggleDoc('${name}')">×</span>`;
        $selectedDocsBar.appendChild(chip);
      });
    }

    // ─── Upload ─────────────────────────────────────────
    $fileInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      $uploadBtn.textContent = "⏳ Uploading...";
      $uploadBtn.classList.add("uploading");

      try {
        const formData = new FormData();
        formData.append("file", file);

        const resp = await fetch(`${API_BASE}/v1/process-document`, {
          method: "POST",
          headers: authHeaders(),
          body: formData,
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || "Upload failed");
        }

        showToast(`"${file.name}" uploaded and processed!`);
        await loadDocuments();
      } catch (e) {
        showToast(e.message, "error");
      } finally {
        $uploadBtn.textContent = "📄 Upload Document";
        $uploadBtn.classList.remove("uploading");
        $fileInput.value = "";
      }
    });

    // ─── Chat ───────────────────────────────────────────
    function updateSendState() {
      $sendBtn.disabled = isStreaming || selectedDocs.size === 0 || !$chatInput.value.trim();
    }

    $chatInput.addEventListener("input", () => {
      updateSendState();
      // Auto-resize
      $chatInput.style.height = "auto";
      $chatInput.style.height = Math.min($chatInput.scrollHeight, 120) + "px";
    });

    $chatInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if (!$sendBtn.disabled) sendMessage();
      }
    });

    $sendBtn.addEventListener("click", sendMessage);

    function addMessage(role, content, meta = null) {
      $chatEmpty.style.display = "none";

      const msg = document.createElement("div");
      msg.className = `message ${role}`;

      const avatar = role === "bot" ? "🧠" : "👤";
      let metaHtml = "";
      if (meta) {
        const chips = [];
        if (meta.confidence_score != null) {
          chips.push(`<span class="meta-chip confidence">Confidence: ${(meta.confidence_score * 100).toFixed(0)}%</span>`);
        }
        if (meta.supporting_facts && meta.supporting_facts.length > 0) {
          const encodedFacts = encodeURIComponent(JSON.stringify(meta.supporting_facts));
          chips.push(`<span class="meta-chip interactive" onclick="showDetailsModal('Supporting Facts', '${encodedFacts}')">${meta.supporting_facts.length} supporting facts</span>`);
        }
        if (meta.sources && meta.sources.length > 0) {
          const encodedSources = encodeURIComponent(JSON.stringify(meta.sources));
          chips.push(`<span class="meta-chip interactive" onclick="showDetailsModal('Sources', '${encodedSources}')">${meta.sources.length} source(s)</span>`);
        }
        if (chips.length) {
          metaHtml = `<div class="message-meta">${chips.join("")}</div>`;
        }
      }

      msg.innerHTML = `
        <div class="message-avatar">${avatar}</div>
        <div>
          <div class="message-content">${escapeHtml(content)}</div>
          ${metaHtml}
        </div>
      `;

      $chatMessages.appendChild(msg);
      $chatMessages.scrollTop = $chatMessages.scrollHeight;
      return msg;
    }

    function addStreamingMessage() {
      $chatEmpty.style.display = "none";

      const msg = document.createElement("div");
      msg.className = "message bot";
      msg.innerHTML = `
        <div class="message-avatar">🧠</div>
        <div>
          <div class="message-content">
            <div class="typing-indicator"><span></span><span></span><span></span></div>
          </div>
        </div>
      `;
      $chatMessages.appendChild(msg);
      $chatMessages.scrollTop = $chatMessages.scrollHeight;
      return msg;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    async function sendMessage() {
      const query = $chatInput.value.trim();
      if (!query || selectedDocs.size === 0) return;

      $chatInput.value = "";
      $chatInput.style.height = "auto";
      isStreaming = true;
      updateSendState();

      addMessage("user", query);

      const streamMsg = addStreamingMessage();
      const contentEl = streamMsg.querySelector(".message-content");
      let streamedText = "";

      try {
        const resp = await fetch(`${API_BASE}/v1/chat-completion`, {
          method: "POST",
          headers: {
            ...authHeaders(),
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            query: query,
            chat_session: chatSession,
            source: Array.from(selectedDocs),
          }),
        });

        if (!resp.ok) throw new Error("Chat request failed");

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop(); // keep incomplete line

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const data = line.slice(6);
            if (data === "[DONE]") continue;

            try {
              const event = JSON.parse(data);

              if (event.event === "text") {
                streamedText += event.data;
                contentEl.textContent = streamedText;
                $chatMessages.scrollTop = $chatMessages.scrollHeight;
              } else if (event.event === "final_response") {
                // Replace with final content + meta
                const d = event.data;
                contentEl.textContent = d.answer || streamedText;

                // Add meta chips
                const metaChips = [];
                if (d.confidence_score != null) {
                  metaChips.push(`<span class="meta-chip confidence">Confidence: ${(d.confidence_score * 100).toFixed(0)}%</span>`);
                }
                if (d.supporting_facts && d.supporting_facts.length > 0) {
                  const encodedFacts = encodeURIComponent(JSON.stringify(d.supporting_facts));
                  metaChips.push(`<span class="meta-chip interactive" onclick="showDetailsModal('Supporting Facts', '${encodedFacts}')">${d.supporting_facts.length} supporting facts</span>`);
                }
                if (d.sources && d.sources.length > 0) {
                  const encodedSources = encodeURIComponent(JSON.stringify(d.sources));
                  metaChips.push(`<span class="meta-chip interactive" onclick="showDetailsModal('Sources', '${encodedSources}')">${d.sources.length} source(s)</span>`);
                }
                if (metaChips.length) {
                  const metaDiv = document.createElement("div");
                  metaDiv.className = "message-meta";
                  metaDiv.innerHTML = metaChips.join("");
                  contentEl.parentElement.appendChild(metaDiv);
                }
              } else if (event.error) {
                contentEl.textContent = `Error: ${event.error}`;
              }
            } catch (parseErr) {
              // skip unparseable chunks
            }
          }
        }

        // If we got no text at all, show fallback
        if (!streamedText && contentEl.querySelector(".typing-indicator")) {
          contentEl.textContent = "No response received.";
        }

      } catch (e) {
        contentEl.textContent = `Error: ${e.message}`;
        showToast("Chat request failed", "error");
      } finally {
        isStreaming = false;
        updateSendState();
      }
    }

    // ─── Init ───────────────────────────────────────────
    (async function init() {
      if (await authenticate()) {
        await loadDocuments();
      }
    })();
  </script>
</body>

</html>
